<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#F97B4F" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle with gradient border -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Sleek background card pattern to make it premium -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="#0D0F14" />
  
  <!-- Neon border outline -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#bgGrad)" stroke-width="8" opacity="0.8" />

  <!-- Initials 'H' with code brackets '</>' styled into a single glyph -->
  <g fill="none" stroke="url(#bgGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left bracket '<' -->
    <path d="M 140 190 L 70 256 L 140 322" />
    
    <!-- Right bracket '>' -->
    <path d="M 372 190 L 442 256 L 372 322" />
    
    <!-- The letter 'H' -->
    <!-- Left vertical of H -->
    <path d="M 210 170 L 210 342" />
    <!-- Right vertical of H -->
    <path d="M 302 170 L 302 342" />
    <!-- Crossbar of H -->
    <path d="M 210 256 L 302 256" />
  </g>
  
  <!-- Small dot for slash/close tag equivalent inside brackets -->
  <circle cx="256" cy="115" r="16" fill="#F97B4F" />
</svg>
